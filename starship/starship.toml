format = """
$directory\
$git_branch\
$git_state\
$git_status\
$lua\
$nodejs\
$bun\
$golang\
$python\
$aws\
$fill\
$cmd_duration $jobs\
$line_break\
$character"""

[character]
success_symbol = '[󱗞](green)'
error_symbol = '[󱗞](red)'
vimcmd_symbol = '[󱗞](purple)'

[directory]
style="white"

[username]
disabled = true

[hostname]
disabled = true

[aws]
format = '[$symbol($profile )(\($region\) )]($style)'
style = 'yellow'
symbol = '  '

[lua]
symbol = " "
style="purple"
format = "[$symbol($version )]($style)"

[nodejs]
format = "[$symbol($version )]($style)"
style = "green"
detect_files = ['package.json', '.node-version', '!bunfig.toml', '!bun.lockb', '!bun.lock']

[bun]
format = "[$symbol($version )]($style)"
symbol="󰳮 "
style = "green"
detect_files = ['bunfig.toml', 'bun.lockb', 'bun.lock']

[golang]
symbol=" "
style="green"
format = "[$symbol($version )]($style)"

[python]
symbol=" "
style = "green"
format = "[$symbol$version (\\($virtualenv\\))]($style) "
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "setup.py", "Pipfile", "tox.ini"]
detect_extensions = ["py"]

[fill]
symbol = " "

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "green"

[jobs]
symbol = ""
style = "red"
number_threshold = 1
format = "[$symbol]($style)"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "green"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style)"
style = "yellow"
